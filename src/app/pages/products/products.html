<section class="products-container">
  <h2 class="section-title">Nuestras Motocicletas</h2>

  <div class="products-grid">
    <article class="product-card" *ngFor="let product of products">
      <div class="product-badge" *ngIf="product.badge">{{ product.badge }}</div>
      <div class="product-image">
        <img [src]="product.image" [alt]="product.alt" />
      </div>
      <div class="product-info">
        <h3>{{ product.name }}</h3>
        <p class="product-description">{{ product.description }}</p>
        <div class="product-footer">
          <span class="product-price">{{ product.price }}</span>
          <a class="btn-details" [routerLink]="['/productos', product.id]">Ver Detalles</a>
        </div>
      </div>
    </article>
  </div>
</section>
